# Project-level Gradle properties — update proxy values if you're behind a proxy.
# Replace the host/port with your corporate proxy. Remove or comment out lines if not needed.

# If you need a proxy in your environment, uncomment and set the real host/port below.
# systemProp.http.proxyHost=proxy.example.com
# systemProp.http.proxyPort=8080
# systemProp.https.proxyHost=proxy.example.com
# systemProp.https.proxyPort=8080

# Optional basic auth (if required) — be cautious storing credentials in plain text.
# systemProp.http.proxyUser=MYUSER
# systemProp.http.proxyPassword=MYPASSWORD
# systemProp.https.proxyUser=MYUSER
# systemProp.https.proxyPassword=MYPASSWORD

# If your environment requires disabling certificate checks (not recommended), you
# can add insecure settings, but prefer importing corporate CA into the JDK truststore.

# systemProp.http.proxyHost=proxy.host.example
# systemProp.http.proxyPort=8080
# systemProp.https.proxyHost=proxy.host.example
# systemProp.https.proxyPort=8080